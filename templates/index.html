<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Demo Frontend</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 1200px;
      height: 760px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      display: flex;
      gap: 16px;
      padding: 16px;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
    }

    .stage {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #202020;
    }

    #avatar-stage {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #avatar-stage canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .subtitle {
      height: 180px;
      padding: 20px;
      font-size: 18px;
      color: #374151;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .sidebar {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .camera {
      height: 180px;
      border-radius: 14px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
      margin-top: 12px;
      overflow: hidden;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111827;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      align-items: stretch;
    }

    #text-input {
      flex: 1;
      height: 70px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      outline: none;
      background: white;
      color: #1f2937;
    }

    #send-text-btn {
      height: 70px;
      min-width: 80px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 15px;
      cursor: pointer;
      background: white;
      color: #374151;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .value {
      font-size: 15px;
      color: #1f2937;
      line-height: 1.5;
      word-break: break-word;
    }

    #debug-log {
      font-family: monospace;
      font-size: 11px;
      white-space: pre-wrap;
      max-height: 90px;
      overflow: auto;
      background: #fff;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app">
      <div class="main">
        <div class="panel stage">
          <div id="avatar-stage"></div>
        </div>

        <div id="subtitle-output" class="panel subtitle">
          This is going to be the subtitle for the generated answers. 
        </div>
      </div>

      <div class="sidebar">
        <div class="card">
          <div class="title">Sign Demo</div>

          <div class="camera">
            <video id="camera-video" autoplay playsinline muted></video>
          </div>

          <div class="buttons">
            <button id="start-camera-btn" class="primary">Start</button>
            <button id="stop-camera-btn" class="secondary">End</button>
          </div>

          <div class="input-row">
            <input id="text-input" type="text" placeholder="Enter text to send..." autocomplete="off" />
            <button id="send-text-btn">Send</button>
          </div>
        </div>

        <div class="card">
          <div class="label">状态</div>
          <div id="camera-status" class="value">前端界面已启动</div>
        </div>

        <div class="card">
          <div class="label">调试日志</div>
          <div id="debug-log" class="value">Waiting for logs...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const debugLogEl = document.getElementById("debug-log");

    function logDebug(...args) {
      const msg = args.map(v => {
        try {
          if (typeof v === "string") return v;
          return JSON.stringify(v);
        } catch {
          return String(v);
        }
      }).join(" ");

      console.log("[INDEX]", ...args);

      if (debugLogEl) {
        debugLogEl.textContent += "\\n" + msg;
        debugLogEl.scrollTop = debugLogEl.scrollHeight;
      }
    }

    debugLogEl.textContent = "index.html loaded";
    logDebug("index.html loaded");
    logDebug("href =", window.location.href);

    window.addEventListener("error", (e) => {
      logDebug("window error:", e.message, "@", e.filename + ":" + e.lineno);
    });

    window.addEventListener("unhandledrejection", (e) => {
      logDebug("unhandled rejection:", String(e.reason));
    });
  </script>

  <script src="/js/three.min.js"></script>
  <script>
    logDebug("three.min.js tag executed");
    logDebug("window.THREE exists =", !!window.THREE);
    if (window.THREE) {
      logDebug("THREE.REVISION =", window.THREE.REVISION);
    }
  </script>

  <script src="/js/GLTFLoader.js"></script>
  <script>
    logDebug("GLTFLoader.js tag executed");
    logDebug("THREE.GLTFLoader exists =", !!(window.THREE && window.THREE.GLTFLoader));
  </script>

  <script type="module" src="/camera.js"></script>
  <script>
    logDebug("camera.js module tag added");
  </script>

  <script type="module" src="/text_input.js"></script>
  <script>
    logDebug("text_input.js module tag added");
  </script>

  <script type="module" src="/avatar.js"></script>
  <script>
    logDebug("avatar.js module tag added");
  </script>
</body>
</html>
